    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('/sw.js?v=8')
            .then((reg) => {
              console.log('SW registered');
              reg.update(); // Force SW to check for new version
            })
            .catch(() => console.log('SW registration failed'));
        });
      }
    </script>
