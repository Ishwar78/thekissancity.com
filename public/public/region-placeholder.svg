<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" fill="none" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f0e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8d5bc;stop-opacity:1" />
    </linearGradient>
    <pattern id="mapPattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="#2d6a4f" opacity="0.1"/>
      <circle cx="25" cy="25" r="3" fill="#6b4423" opacity="0.3"/>
      <circle cx="75" cy="75" r="3" fill="#6b4423" opacity="0.3"/>
      <path d="M10,50 Q50,30 90,50" stroke="#2d6a4f" stroke-width="1" fill="none" opacity="0.2"/>
      <path d="M10,80 Q50,60 90,80" stroke="#2d6a4f" stroke-width="1" fill="none" opacity="0.2"/>
    </pattern>
  </defs>
  
  <!-- Background circle -->
  <circle cx="200" cy="200" r="190" fill="url(#bg)"/>
  <circle cx="200" cy="200" r="190" fill="url(#mapPattern)"/>
  
  <!-- Border gradient -->
  <circle cx="200" cy="200" r="190" fill="none" stroke="url(#border)" stroke-width="8"/>
  <defs>
    <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d6a4f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6b4423;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Map-like illustration -->
  <g transform="translate(200, 200)">
    <!-- Simplified India map outline -->
    <path d="M-30,-60 Q-20,-70 0,-65 Q20,-70 30,-60 Q40,-40 35,-20 Q30,0 25,20 Q15,40 0,50 Q-15,40 -25,20 Q-30,0 -35,-20 Q-40,-40 -30,-60 Z" 
          fill="#4a90e2" opacity="0.3" stroke="#2d6a4f" stroke-width="2"/>
    
    <!-- State boundaries -->
    <path d="M-20,-40 L-10,-30 L0,-35 L10,-30 L20,-40" stroke="#6b4423" stroke-width="1" fill="none" opacity="0.5"/>
    <path d="M-15,-20 L-5,-10 L5,-15 L15,-10" stroke="#6b4423" stroke-width="1" fill="none" opacity="0.5"/>
    <path d="M-10,0 L0,5 L10,0" stroke="#6b4423" stroke-width="1" fill="none" opacity="0.5"/>
    <path d="M-5,20 L5,25 L15,20" stroke="#6b4423" stroke-width="1" fill="none" opacity="0.5"/>
    
    <!-- Location markers -->
    <circle cx="-10" cy="-20" r="4" fill="#e74c3c"/>
    <circle cx="10" cy="-10" r="4" fill="#e74c3c"/>
    <circle cx="0" cy="10" r="4" fill="#e74c3c"/>
    <circle cx="-5" cy="30" r="4" fill="#e74c3c"/>
  </g>
  
  <!-- Region label -->
  <text x="200" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="600" fill="#2d6a4f">
    REGION
  </text>
</svg>
